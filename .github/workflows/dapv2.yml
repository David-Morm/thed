name: Download and save to repo

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: 'Direct download URL'
        required: true
        type: string
      filename:
        description: 'Name to save the file as (optional)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set filename
        run: |
          if [ -z "${{ inputs.filename }}" ]; then
            FILENAME=$(basename "${{ inputs.download_url }}" | cut -d'?' -f1)
            if [ -z "$FILENAME" ]; then
              FILENAME="downloaded_file"
            fi
          else
            FILENAME="${{ inputs.filename }}"
          fi
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Download the file
        run: |
          HTTP_STATUS=$(curl -L \
            --progress-bar \
            --write-out "%{http_code}" \
            --output "${{ env.FILENAME }}" \
            --retry 3 \
            "${{ inputs.download_url }}")

          if [[ "$HTTP_STATUS" -lt 200 || "$HTTP_STATUS" -ge 300 ]]; then
            echo "::error::Download failed — HTTP status $HTTP_STATUS"
            exit 1
          fi

          if [[ ! -s "${{ env.FILENAME }}" ]]; then
            echo "::error::Downloaded file is empty"
            exit 1
          fi

          echo "Downloaded successfully (HTTP $HTTP_STATUS)"
          ls -lh "${{ env.FILENAME }}"

      - name: Commit and push to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${{ env.FILENAME }}"

          if git diff --cached --quiet; then
            echo "File unchanged — skipping commit."
            exit 0
          fi

          git commit -m "chore: add ${{ env.FILENAME }}"
          git push --progress
